<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — M.O.B Eki Ventures</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: 28px; max-width: 1280px; margin: 0 auto; padding: 40px 32px; align-items: start; }
    .cart-table-header { display: grid; grid-template-columns: 1fr 120px 140px 100px; gap: 16px; padding: 0 0 12px; border-bottom: 2px solid var(--border); font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); }
    .cart-item { display: grid; grid-template-columns: 1fr 120px 140px 100px; gap: 16px; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); transition: background .15s; }
    .cart-item-product { display: flex; gap: 14px; align-items: center; }
    .cart-item-img { width: 70px; height: 58px; border-radius: var(--radius); object-fit: cover; flex-shrink: 0; background: var(--blue-pale); }
    .cart-item-cat { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--blue-mid); margin-bottom: 3px; }
    .cart-item-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .cart-item-unit { font-size: 12px; color: var(--text-muted); }
    .cart-item-remove { font-size: 12px; font-weight: 600; color: var(--danger); cursor: pointer; background: none; border: none; padding: 0; margin-top: 5px; display: flex; align-items: center; gap: 4px; }
    .cart-item-remove:hover { opacity: .7; }
    .cart-item-price { font-size: 14px; font-weight: 600; color: var(--text-mid); }
    .qty-control-sm { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: var(--radius-pill); overflow: hidden; background: var(--white); width: fit-content; }
    .qty-btn-sm { width: 32px; height: 32px; background: none; border: none; cursor: pointer; font-size: 16px; font-weight: 700; color: var(--blue); transition: background .15s; }
    .qty-btn-sm:hover { background: var(--blue-pale); }
    .qty-num { width: 36px; text-align: center; font-size: 14px; font-weight: 700; border-left: 1px solid var(--border); border-right: 1px solid var(--border); padding: 4px 0; line-height: 24px; }
    .cart-item-total { font-size: 15px; font-weight: 800; color: var(--text-dark); }
    .continue-link { display: inline-flex; align-items: center; gap: 6px; color: var(--blue); font-size: 13px; font-weight: 600; margin-top: 16px; text-decoration: none; }
    .continue-link:hover { text-decoration: underline; }
    .empty-cart { text-align: center; padding: 80px 32px; grid-column: 1/-1; }
    .empty-cart-icon { font-size: 60px; margin-bottom: 16px; }
    .empty-cart h3 { font-family: var(--font-display); font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .empty-cart p { color: var(--text-muted); margin-bottom: 24px; }
    .order-summary { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 24px; position: sticky; top: 100px; box-shadow: var(--shadow-sm); }
    .order-summary h3 { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .summary-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; color: var(--text-muted); }
    .summary-line span:last-child { color: var(--text-dark); font-weight: 600; }
    .summary-total { display: flex; justify-content: space-between; font-size: 17px; font-weight: 800; padding-top: 16px; border-top: 1.5px solid var(--border); margin-bottom: 20px; }
    .checkout-btn { width: 100%; background: var(--blue); color: var(--white); border: none; padding: 16px; font-size: 14px; font-weight: 700; letter-spacing: .04em; border-radius: var(--radius-pill); cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(21,101,192,0.3); }
    .checkout-btn:hover { background: var(--blue-dark); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(21,101,192,0.4); }
    .secure-note { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 12px; }

    /* Orb in cart bg */
    #cart-layout{position:relative}
    /* 3D cart items */
    .cart-item{transition:background .2s,transform .2s;border-radius:var(--radius);padding-left:8px;padding-right:8px}
    .cart-item:hover{background:var(--blue-pale);transform:translateX(3px)}
    /* Glassy order summary */
    .order-summary{backdrop-filter:blur(16px);background:rgba(255,255,255,.9);border:1px solid rgba(100,181,246,.2)}
    /* Checkout btn glow */
    .checkout-btn{background:linear-gradient(135deg,var(--blue),var(--blue-mid));box-shadow:0 6px 20px rgba(21,101,192,.35),inset 0 1px 0 rgba(255,255,255,.15)}
    .checkout-btn:hover{box-shadow:0 10px 28px rgba(21,101,192,.5),var(--glow)}
    /* Qty control */
    .qty-control-sm{box-shadow:var(--shadow-sm)}
    .qty-btn-sm:hover{background:linear-gradient(135deg,var(--blue-pale),rgba(100,181,246,.2))}
    /* Modal glass */
    .checkout-modal{backdrop-filter:blur(20px);background:rgba(255,255,255,.97);border:1px solid rgba(100,181,246,.15)}
    /* Summary total gradient */
    .summary-total{background:linear-gradient(90deg,var(--light-bg),transparent);padding:16px 8px;border-radius:var(--radius);margin-left:-8px;margin-right:-8px}
    /* Cart table header */
    .cart-table-header{background:var(--light-bg);padding:12px 8px;border-radius:var(--radius) var(--radius) 0 0;border-bottom:2px solid rgba(100,181,246,.2)}
    /* Empty cart 3D icon */
    .empty-cart-icon{filter:drop-shadow(0 4px 12px rgba(21,101,192,.2));animation:float 4s ease-in-out infinite}

    .checkout-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .checkout-overlay.open { display: flex; }
    .checkout-modal { background: var(--white); border-radius: var(--radius-lg); padding: 40px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-md); }
    .checkout-modal h2 { font-family: var(--font-display); font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .checkout-step-label { font-size: 12px; font-weight: 600; color: var(--blue); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 24px; display: block; }
    .modal-close { float: right; font-size: 22px; background: none; border: none; cursor: pointer; color: var(--text-muted); margin-top: -4px; }
    .modal-close:hover { color: var(--text-dark); }
    .pay-option { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-md); cursor: pointer; margin-bottom: 10px; transition: border-color .2s; }
    .pay-option:has(input:checked) { border-color: var(--blue); background: var(--blue-pale); }
    .order-confirm { text-align: center; padding: 40px 0; }
    .order-confirm-icon { font-size: 60px; margin-bottom: 16px; }
    .order-confirm h2 { font-family: var(--font-display); font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .order-confirm p { color: var(--text-muted); margin-bottom: 8px; }
    .order-number { font-size: 20px; font-weight: 800; color: var(--blue); letter-spacing: .06em; margin: 12px 0; }
  </style>
</head>
<body>
<div id="site-header"></div>
<div class="page-hero" style="position:relative;overflow:hidden"><div class="orb orb-1" style="top:-60px;right:5%;opacity:.5;width:300px;height:300px"></div>
  <div class="page-hero-inner">
    <span class="page-hero-label">Your</span>
    <h1 id="cart-title">Shopping Cart</h1>
  </div>
</div>
<div style="background:var(--light-bg)">
  <div class="cart-layout" id="cart-layout"></div>
</div>
<div class="checkout-overlay" id="checkout-overlay">
  <div class="checkout-modal" id="checkout-modal"></div>
</div>
<div id="site-footer"></div>
<script src="scripts/main.js"></script>
<script src="scripts/components.js"></script>
<script>
  renderHeader(''); renderFooter('');
  const FREE = MOB_SETTINGS.FREE;
  const DFEE = MOB_SETTINGS.DFEE;

  function renderCart() {
    const items = Cart.get();
    document.getElementById('cart-title').textContent = `Shopping Cart (${Cart.count()})`;
    if (!items.length) {
      document.getElementById('cart-layout').innerHTML = `
        <div class="empty-cart">
          <div class="empty-cart-icon">🛒</div>
          <h3>Your cart is empty</h3>
          <p>Add some building materials to get started.</p>
          <a href="shop.html" class="btn btn-primary">Browse Products</a>
        </div>`;
      return;
    }
    const subtotal = Cart.total();
    const delivery = subtotal >= FREE ? 0 : DFEE;
    const total = subtotal + delivery;
    const remaining = FREE - subtotal;

    document.getElementById('cart-layout').innerHTML = `
      <div>
        <div class="cart-table-header"><span>Product</span><span>Price</span><span>Qty</span><span>Total</span></div>
        ${items.map(item => `
          <div class="cart-item">
            <div class="cart-item-product">
              <img src="${item.img}" alt="${item.name}" class="cart-item-img">
              <div>
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-unit">per ${item.unit || ''}</div>
                <button class="cart-item-remove" onclick="removeItem(${item.id})">🗑 Remove</button>
              </div>
            </div>
            <div class="cart-item-price">₦${item.price.toLocaleString()}</div>
            <div>
              <div class="qty-control-sm">
                <button class="qty-btn-sm" onclick="changeQty(${item.id},-1)">−</button>
                <div class="qty-num">${item.qty}</div>
                <button class="qty-btn-sm" onclick="changeQty(${item.id},1)">+</button>
              </div>
            </div>
            <div class="cart-item-total">₦${(item.price*item.qty).toLocaleString()}</div>
          </div>`).join('')}
        <a href="shop.html" class="continue-link">← Continue Shopping</a>
      </div>
      <div>
        <div class="order-summary">
          <h3>Order Summary</h3>
          ${items.map(i=>`<div class="summary-line"><span>${i.name} ×${i.qty}</span><span>₦${(i.price*i.qty).toLocaleString()}</span></div>`).join('')}
          <div class="summary-line" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
            <span>Subtotal</span><span>₦${subtotal.toLocaleString()}</span>
          </div>
          <div class="summary-line">
            <span>Delivery</span>
            <span>${delivery===0 ? '<span style="color:var(--success)">Free 🎉</span>' : '₦'+delivery.toLocaleString()}</span>
          </div>
          ${delivery>0 ? `<div style="font-size:12px;color:var(--blue);margin-bottom:12px">Add ₦${remaining.toLocaleString()} more for free delivery</div>` : ''}
          <div class="summary-total"><span>Total</span><span>₦${total.toLocaleString()}</span></div>
          <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout →</button>
          <div class="secure-note">🔒 Secure checkout · Paystack & Bank Transfer</div>
        </div>
      </div>`;
  }

  function removeItem(id) { Cart.remove(id); renderCart(); }
  function changeQty(id, d) {
    const item = Cart.get().find(i => i.id === id);
    if (!item) return;
    if (item.qty + d < 1) { Cart.remove(id); renderCart(); return; }
    Cart.updateQty(id, item.qty + d);
    renderCart();
  }

  let step = 1;
  let checkoutDetails = {};
  let generatedOrderNum = '';

  function openCheckout() { step = 1; renderStep(); document.getElementById('checkout-overlay').classList.add('open'); }
  function closeCheckout() { document.getElementById('checkout-overlay').classList.remove('open'); }

  function validateStep1() {
    const fn = document.getElementById('co-fn').value.trim();
    const ln = document.getElementById('co-ln').value.trim();
    const ph = document.getElementById('co-ph').value.trim();
    const em = document.getElementById('co-em').value.trim();
    const ad = document.getElementById('co-ad').value.trim();
    const st = document.getElementById('co-st').value;
    const ci = document.getElementById('co-ci').value.trim();

    if (!fn || !ln || !ph || !em || !ad || !ci) {
      showToast('Please fill in all delivery details', 'error');
      return;
    }

    checkoutDetails = { firstName: fn, lastName: ln, phone: ph, email: em, address: ad, state: st, city: ci };
    step = 2;
    renderStep();
  }

  function renderStep() {
    const subtotal = Cart.total(), delivery = subtotal >= FREE ? 0 : DFEE, total = subtotal + delivery;
    const modal = document.getElementById('checkout-modal');
    if (step === 1) {
      modal.innerHTML = `
        <button class="modal-close" onclick="closeCheckout()">×</button>
        <h2>Checkout</h2>
        <span class="checkout-step-label">Step 1 of 2 — Delivery Details</span>
        <div class="form-row">
          <div class="form-group"><label class="form-label">First Name</label><input class="form-input" id="co-fn" value="${checkoutDetails.firstName || ''}" placeholder="Emeka"></div>
          <div class="form-group"><label class="form-label">Last Name</label><input class="form-input" id="co-ln" value="${checkoutDetails.lastName || ''}" placeholder="Okafor"></div>
        </div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="co-ph" value="${checkoutDetails.phone || ''}" placeholder="0803 456 7890"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="co-em" type="email" value="${checkoutDetails.email || ''}" placeholder="you@example.com"></div>
        <div class="form-group"><label class="form-label">Delivery Address</label><input class="form-input" id="co-ad" value="${checkoutDetails.address || ''}" placeholder="15 Adeola Odeku Street, VI, Lagos"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">State</label><select class="form-input" id="co-st"><option ${checkoutDetails.state==='Lagos'?'selected':''}>Lagos</option><option ${checkoutDetails.state==='Abuja'?'selected':''}>Abuja</option><option ${checkoutDetails.state==='Rivers'?'selected':''}>Rivers</option><option ${checkoutDetails.state==='Ogun'?'selected':''}>Ogun</option><option ${checkoutDetails.state==='Kano'?'selected':''}>Kano</option><option ${checkoutDetails.state==='Other'?'selected':''}>Other</option></select></div>
          <div class="form-group"><label class="form-label">City / LGA</label><input class="form-input" id="co-ci" value="${checkoutDetails.city || ''}" placeholder="Ikeja"></div>
        </div>
        <button class="btn btn-primary btn-full" onclick="validateStep1()">Continue to Payment →</button>`;
    } else if (step === 2) {
      modal.innerHTML = `
        <button class="modal-close" onclick="closeCheckout()">×</button>
        <h2>Payment</h2>
        <span class="checkout-step-label">Step 2 of 2 — Select Payment Method</span>
        <label class="pay-option"><input type="radio" name="pay" value="paystack" checked style="accent-color:var(--blue)"><span style="font-size:20px">💳</span><div><strong>Paystack</strong><br><small style="color:var(--text-muted)">Card, Bank Transfer, USSD</small></div></label>
        <label class="pay-option"><input type="radio" name="pay" value="bank" style="accent-color:var(--blue)"><span style="font-size:20px">🏦</span><div><strong>Bank Transfer</strong><br><small style="color:var(--text-muted)">Confirm within 24 hours</small></div></label>
        <div style="background:var(--light-bg);border-radius:var(--radius-md);padding:16px;margin:20px 0">
          <div class="summary-line"><span>Subtotal</span><span>₦${subtotal.toLocaleString()}</span></div>
          <div class="summary-line"><span>Delivery</span><span>${delivery===0?'Free':'₦'+delivery.toLocaleString()}</span></div>
          <div class="summary-total" style="margin-bottom:0"><span>Total</span><span>₦${total.toLocaleString()}</span></div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline-blue" style="flex:1;justify-content:center" onclick="step=1;renderStep()">← Back</button>
          <button class="checkout-btn" style="flex:2" onclick="placeOrder()">Place Order →</button>
        </div>
        <div class="secure-note" style="margin-top:12px">🔒 Secured by Paystack</div>`;
    } else {
      modal.innerHTML = `
        <div class="order-confirm">
          <div class="order-confirm-icon">✅</div>
          <h2>Order Placed!</h2>
          <p>Thank you. Your order has been received and is being processed.</p>
          <div class="order-number">${generatedOrderNum}</div>
          <p style="font-size:13px">You'll receive a confirmation SMS shortly.</p>
          <div style="display:flex;gap:12px;justify-content:center;margin-top:24px">
            <a href="account.html" class="btn btn-outline-blue" onclick="closeCheckout()">My Orders</a>
            <a href="shop.html" class="btn btn-primary" onclick="closeCheckout()">Continue Shopping</a>
          </div>
        </div>`;
      localStorage.removeItem('mob_cart');
      Cart.updateBadge();
    }
  }

  function placeOrder() {
    const subtotal = Cart.total(), delivery = subtotal >= FREE ? 0 : DFEE, total = subtotal + delivery;
    generatedOrderNum = 'MOB-2026-' + Math.floor(1000+Math.random()*9000);
    
    const newOrder = {
      id: generatedOrderNum,
      date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }),
      customerName: `${checkoutDetails.firstName} ${checkoutDetails.lastName}`,
      phone: checkoutDetails.phone,
      email: checkoutDetails.email,
      address: checkoutDetails.address,
      state: checkoutDetails.state,
      city: checkoutDetails.city,
      total: total,
      status: 'Pending',
      items: Cart.get()
    };

    DB.saveOrder(newOrder);
    step = 3;
    renderStep();
  }

  document.getElementById('checkout-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeCheckout(); });
  renderCart();
</script>
</body>
</html>
