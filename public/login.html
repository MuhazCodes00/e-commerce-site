<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — M.O.B Eki Ventures</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    body{min-height:100vh;background:linear-gradient(135deg,#040e20 0%,var(--ocean) 40%,var(--blue-dark) 100%);display:flex;flex-direction:column}
    .auth-page{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;position:relative;overflow:hidden}
    .auth-card{
      background:rgba(255,255,255,.95);
      border:1px solid rgba(100,181,246,.2);
      border-radius:var(--radius-xl);
      padding:48px;
      width:100%;max-width:440px;
      box-shadow:var(--shadow-3d);
      backdrop-filter:blur(20px);
      position:relative;z-index:2;
      animation:fadeUp .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    .auth-logo{text-align:center;margin-bottom:32px}
    .auth-logo .logo-mark{width:56px;height:56px;font-size:15px;margin:0 auto 12px;background:linear-gradient(135deg,var(--blue-light),var(--blue-dark));box-shadow:var(--glow)}
    .auth-logo strong{display:block;font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--ocean),var(--blue-mid));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .auth-logo span{font-size:12px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
    .auth-title{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--text-dark);margin-bottom:6px;text-align:center}
    .auth-sub{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:32px}
    .auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-muted);font-size:12px}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .auth-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--text-muted)}
    .auth-footer a{color:var(--blue);font-weight:600;text-decoration:none}
    .auth-footer a:hover{text-decoration:underline}
    .forgot-link{text-align:right;margin-top:-10px;margin-bottom:16px}
    .forgot-link a{font-size:12px;color:var(--blue);text-decoration:none;font-weight:600}
    .forgot-link a:hover{text-decoration:underline}
    @keyframes fadeUp{from{opacity:0;transform:translateY(32px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  </style>
</head>
<body>
<div id="site-header"></div>
<div class="auth-page">
  <div class="orb orb-1" style="top:-100px;left:10%;opacity:.5"></div>
  <div class="orb orb-2" style="bottom:-80px;right:15%;opacity:.4"></div>
  <div class="orb orb-3" style="top:40%;left:60%;opacity:.3"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">MOB</div>
      <strong>M.O.B EKI VENTURES</strong>
      <span>Building Materials</span>
    </div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Sign in to your account to continue</p>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Enter your password">
    </div>
    <div class="forgot-link"><a href="#">Forgot password?</a></div>
    <button class="btn btn-primary btn-full" onclick="handleLogin()" style="padding:15px;font-size:14px">Sign In →</button>

    <div class="auth-divider">or</div>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one free</a>
    </div>
  </div>
</div>
<script src="scripts/main.js"></script>
<script src="scripts/components.js"></script>
<script>
  renderHeader('');
  function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    if (!email || !pass) { showToast('Please fill in all fields'); return; }
    showToast('Signing you in...');
    setTimeout(() => window.location.href = 'account.html', 1200);
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
